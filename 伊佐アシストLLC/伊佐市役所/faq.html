<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="よくある質問の検索・一覧 | 伊佐市役所 窓口案内システム">
  <title>よくある質問 | 伊佐市役所</title>

  <!-- Google Fonts: Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-faq page-layout">

  <!-- スキップリンク（アクセシビリティ） -->
  <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>

  <!-- アイドルタイムアウト警告オーバーレイ -->
  <div class="timeout-overlay" id="timeout-overlay" role="dialog" aria-modal="true" aria-labelledby="timeout-title" hidden>
    <div class="timeout-dialog">
      <p class="timeout-title" id="timeout-title">画面が自動でリセットされます</p>
      <div class="timeout-countdown" aria-live="assertive">
        <span id="timeout-seconds">5</span><span>秒後にホームに戻ります</span>
      </div>
      <div class="timeout-bar-wrap" aria-hidden="true">
        <div class="timeout-bar" id="timeout-bar"></div>
      </div>
      <button
        type="button"
        class="btn btn--primary btn--large"
        id="timeout-cancel-btn"
        aria-label="タイムアウトをキャンセルして操作を続ける"
      >続けて操作する</button>
    </div>
  </div>

  <!-- ヘッダー -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <div class="header-logo">
        <img
          src="images/logo-placeholder.svg"
          alt="伊佐市役所"
          class="header-logo__img"
          width="48"
          height="48"
          onerror="this.style.display='none'"
        >
        <div class="header-logo__text">
          <span class="header-logo__city">伊佐市役所</span>
          <span class="header-logo__subtitle">窓口案内システム</span>
        </div>
      </div>

      <nav class="header-controls" role="navigation" aria-label="言語・表示設定">
        <button
          type="button"
          class="ctrl-btn ctrl-btn--font"
          id="font-size-toggle"
          aria-pressed="false"
          aria-label="文字を大きくする"
        >
          <span class="ctrl-btn__icon" aria-hidden="true">A</span>
          <span class="ctrl-btn__label">文字サイズ</span>
        </button>

        <div class="lang-switcher" role="group" aria-label="言語切り替え">
          <button type="button" class="lang-btn lang-btn--active" data-lang="ja" aria-pressed="true" aria-label="日本語に切り替え">日本語</button>
          <button type="button" class="lang-btn" data-lang="en" aria-pressed="false" aria-label="Switch to English">EN</button>
          <button type="button" class="lang-btn" data-lang="zh" aria-pressed="false" aria-label="切换到中文">中文</button>
          <button type="button" class="lang-btn" data-lang="ko" aria-pressed="false" aria-label="한국어로 전환">한국어</button>
        </div>
      </nav>
    </div>
  </header>

  <!-- ページヘッダー（タイトル＋戻るボタン） -->
  <div class="page-header" role="navigation" aria-label="ページナビゲーション">
    <a href="index.html" class="page-header__back" aria-label="ホームに戻る">&#8592;</a>
    <h1 class="page-header__title" id="page-title">よくある質問</h1>
  </div>

  <!-- メインコンテンツ -->
  <main id="main-content" class="site-main" role="main">

    <!-- 検索バー -->
    <section class="search-bar" aria-labelledby="search-label">
      <h2 class="sr-only" id="search-label">キーワード検索</h2>
      <div class="search-input-wrap" role="search">
        <span class="search-input-icon" aria-hidden="true">🔍</span>
        <label for="search-input" class="sr-only">キーワードを入力</label>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="例: 住民票、保育所、ごみ..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="質問をキーワードで検索"
        >
        <button
          type="button"
          class="search-clear-btn"
          id="search-clear-btn"
          aria-label="検索テキストをクリア"
          hidden
        >✕</button>
        <!-- 音声入力ボタン -->
        <button
          type="button"
          class="ctrl-btn ctrl-btn--voice"
          id="voice-input-btn"
          aria-label="音声でキーワードを入力する"
          aria-pressed="false"
        >
          <span class="ctrl-btn__icon" aria-hidden="true">🎤</span>
          <span class="ctrl-btn__label">音声入力</span>
        </button>
      </div>
    </section>

    <!-- カテゴリフィルター -->
    <nav class="category-filter" aria-label="カテゴリで絞り込む" id="category-filter">
      <!-- faq.jsが動的に生成する -->
    </nav>

    <!-- FAQリスト -->
    <section class="faq-list-section" id="faq-list-section" aria-labelledby="faq-list-label">
      <p class="faq-count" id="faq-count" aria-live="polite" aria-atomic="true"></p>
      <h2 class="sr-only" id="faq-list-label">質問一覧</h2>
      <ul class="faq-list" id="faq-list" role="list">
        <!-- faq.jsが動的に生成する -->
      </ul>

      <!-- 検索結果ゼロ表示 -->
      <div class="no-results" id="no-results" role="status" aria-live="polite">
        <div class="no-results__icon" aria-hidden="true">🔎</div>
        <p class="no-results__title">見つかりませんでした</p>
        <p class="no-results__text" id="no-results-text">キーワードを変えてお試しください。</p>
        <a href="escalate.html" class="btn btn--primary btn--large" aria-label="職員に直接質問する">
          職員に直接質問する
        </a>
      </div>
    </section>

  </main>

  <!-- フッター -->
  <footer class="site-footer" role="contentinfo">
    <p class="footer-text">解決しない場合は、窓口スタッフにお気軽にお声がけください。</p>
    <a href="escalate.html" class="footer-escalate-btn" aria-label="職員を呼ぶ・番号札を発行する">
      職員を呼ぶ / 番号札を発行する
    </a>
  </footer>

  <!-- JavaScript -->
  <script src="js/faq-data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/faq.js"></script>
</body>
</html>
