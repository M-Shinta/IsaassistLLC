<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="伊佐市役所 窓口案内・AIスマート回答システム">
  <title>窓口案内 | 伊佐市役所</title>

  <!-- Google Fonts: Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-home">

  <!-- スキップリンク（アクセシビリティ） -->
  <a href="#main-content" class="skip-link" data-i18n="skip_to_main">メインコンテンツへスキップ</a>

  <!-- ローディングオーバーレイ -->
  <div class="loading-overlay" id="loading-overlay" role="status" aria-label="読み込み中">
    <div class="loading-spinner" aria-hidden="true">
      <div class="spinner-ring"></div>
      <div class="spinner-ring spinner-ring--delay"></div>
    </div>
    <p class="loading-text" data-i18n="loading">読み込み中...</p>
  </div>

  <!-- アイドルタイムアウト警告オーバーレイ -->
  <div class="timeout-overlay" id="timeout-overlay" role="dialog" aria-modal="true" aria-labelledby="timeout-title" hidden>
    <div class="timeout-dialog">
      <p class="timeout-title" id="timeout-title" data-i18n="timeout_warning">画面が自動でリセットされます</p>
      <div class="timeout-countdown" aria-live="assertive">
        <span id="timeout-seconds">5</span><span data-i18n="timeout_seconds_unit">秒後にホームに戻ります</span>
      </div>
      <div class="timeout-bar-wrap" aria-hidden="true">
        <div class="timeout-bar" id="timeout-bar"></div>
      </div>
      <button
        type="button"
        class="btn btn--primary btn--large"
        id="timeout-cancel-btn"
        data-i18n="timeout_cancel"
        aria-label="タイムアウトをキャンセルして操作を続ける"
      >続けて操作する</button>
    </div>
  </div>

  <!-- ヘッダー -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <div class="header-logo">
        <img
          src="images/logo-placeholder.svg"
          alt="伊佐市役所"
          class="header-logo__img"
          width="48"
          height="48"
          onerror="this.style.display='none'"
        >
        <div class="header-logo__text">
          <span class="header-logo__city" data-i18n="city_name">伊佐市役所</span>
          <span class="header-logo__subtitle" data-i18n="system_name">窓口案内システム</span>
        </div>
      </div>

      <nav class="header-controls" role="navigation" aria-label="言語・表示設定">
        <!-- 文字サイズ切り替え -->
        <button
          type="button"
          class="ctrl-btn ctrl-btn--font"
          id="font-size-toggle"
          aria-pressed="false"
          data-i18n-aria="font_size_toggle_label"
          aria-label="文字を大きくする"
        >
          <span class="ctrl-btn__icon" aria-hidden="true">A</span>
          <span class="ctrl-btn__label" data-i18n="font_size_label">文字サイズ</span>
        </button>

        <!-- 言語切り替え -->
        <div class="lang-switcher" role="group" aria-label="言語切り替え">
          <button type="button" class="lang-btn lang-btn--active" data-lang="ja" aria-pressed="true" aria-label="日本語に切り替え">日本語</button>
          <button type="button" class="lang-btn" data-lang="en" aria-pressed="false" aria-label="Switch to English">EN</button>
          <button type="button" class="lang-btn" data-lang="zh" aria-pressed="false" aria-label="切换到中文">中文</button>
          <button type="button" class="lang-btn" data-lang="ko" aria-pressed="false" aria-label="한국어로 전환">한국어</button>
        </div>
      </nav>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main id="main-content" class="site-main" role="main">

    <!-- ウェルカムセクション -->
    <section class="welcome-section" aria-labelledby="welcome-heading">
      <h1 class="welcome-heading" id="welcome-heading" data-i18n="welcome_heading">何かお困りですか？</h1>
      <p class="welcome-subheading" data-i18n="welcome_subheading">カテゴリをタップして、お調べになりたいことを選んでください。</p>
    </section>

    <!-- カテゴリタイルグリッド -->
    <section class="category-section" aria-labelledby="category-heading">
      <h2 class="sr-only" id="category-heading" data-i18n="category_heading">お手続きのカテゴリ</h2>

      <div class="category-grid" role="list">

        <a href="faq.html?category=residence" class="category-tile" role="listitem" aria-label="住民票・戸籍に関するご質問">
          <div class="category-tile__icon" aria-hidden="true">🏠</div>
          <span class="category-tile__label" data-i18n="cat_residence">住民票・戸籍</span>
        </a>

        <a href="faq.html?category=tax" class="category-tile" role="listitem" aria-label="税金・国民健康保険に関するご質問">
          <div class="category-tile__icon" aria-hidden="true">💴</div>
          <span class="category-tile__label" data-i18n="cat_tax">税金・国保</span>
        </a>

        <a href="faq.html?category=childcare" class="category-tile" role="listitem" aria-label="子育て・教育に関するご質問">
          <div class="category-tile__icon" aria-hidden="true">👶</div>
          <span class="category-tile__label" data-i18n="cat_childcare">子育て・教育</span>
        </a>

        <a href="faq.html?category=welfare" class="category-tile" role="listitem" aria-label="介護・福祉に関するご質問">
          <div class="category-tile__icon" aria-hidden="true">🤝</div>
          <span class="category-tile__label" data-i18n="cat_welfare">介護・福祉</span>
        </a>

        <a href="faq.html?category=land" class="category-tile" role="listitem" aria-label="土地・建物に関するご質問">
          <div class="category-tile__icon" aria-hidden="true">🏗️</div>
          <span class="category-tile__label" data-i18n="cat_land">土地・建物</span>
        </a>

        <a href="faq.html?category=environment" class="category-tile" role="listitem" aria-label="ごみ・環境に関するご質問">
          <div class="category-tile__icon" aria-hidden="true">♻️</div>
          <span class="category-tile__label" data-i18n="cat_environment">ごみ・環境</span>
        </a>

        <a href="floor-map.html" class="category-tile" role="listitem" aria-label="庁舎フロアマップを見る">
          <div class="category-tile__icon" aria-hidden="true">🗺️</div>
          <span class="category-tile__label" data-i18n="cat_floormap">フロアマップ</span>
        </a>

        <a href="faq.html" class="category-tile" role="listitem" aria-label="その他よくある質問を検索する">
          <div class="category-tile__icon" aria-hidden="true">❓</div>
          <span class="category-tile__label" data-i18n="cat_other">その他・よくある質問</span>
        </a>

      </div>
    </section>

    <!-- キーワード検索 -->
    <section class="search-section" aria-labelledby="search-heading">
      <h2 class="sr-only" id="search-heading" data-i18n="search_heading">キーワードで探す</h2>
      <a href="faq.html" class="search-cta-btn" aria-label="キーワードを入力してよくある質問を検索する">
        <span class="search-cta-btn__icon" aria-hidden="true">🔍</span>
        <span class="search-cta-btn__text" data-i18n="search_cta">キーワードで探す</span>
      </a>
    </section>

  </main>

  <!-- フッター -->
  <footer class="site-footer" role="contentinfo">
    <p class="footer-text" data-i18n="footer_support">解決しない場合は、窓口スタッフにお気軽にお声がけください。</p>
    <a href="escalate.html" class="footer-escalate-btn" aria-label="職員を呼ぶ・番号札を発行する">
      <span data-i18n="footer_escalate">職員を呼ぶ / 番号札を発行する</span>
    </a>
  </footer>

  <!-- JavaScript -->
  <script src="js/i18n.js"></script>
  <script src="js/faq-data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
